# Hum2Tune Configuration

project:
  name: "Hum2Tune"
  version: "1.1.0"
  author: "FYP Student"
  description: "Humming-based music recognition with DTW baseline and CNN-LSTM model"

audio:
  sample_rate: 22050
  duration: 30.0
  n_mels: 128
  n_mfcc: 13
  n_fft: 2048
  hop_length: 512
  min_freq: 80
  max_freq: 8000

models:
  cnn_lstm:
    input_channels: 13
    hidden_size: 64
    num_layers: 1
    dropout: 0.4
    bidirectional: true
    use_attention: true
    norm_type: "group"

  dtw:
    distance_metric: "euclidean"
    top_k: 5

training:
  batch_size: 4
  learning_rate: 0.0003
  epochs: 80
  early_stopping_patience: 10
  gradient_clip: 1.0
  weight_decay: 0.001
  scheduler_patience: 4
  scheduler_factor: 0.5
  min_lr: 0.00001
  seed: 42

evaluation:
  metrics: ["accuracy", "top_k_accuracy", "mrr", "macro_f1", "weighted_f1"]
  top_k: 3