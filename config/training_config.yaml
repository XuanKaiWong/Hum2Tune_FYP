# Hum2Tune -- Training Configuration
# This file is the single source of truth for all training hyperparameters.
# Values here override the defaults coded in train_model.py::load_config().

training:
  # ── Data ─────────────────────────────────────────────────────────────────
  # input_channels MUST match FeatureExtractor.input_channels = n_mfcc * 3
  input_channels: 39
  # num_workers: set to 0 on Windows to avoid DataLoader spawn issues.
  # On Linux/Mac with a GPU, set to 4-8 for faster data loading.
  num_workers: 0
  batch_size: 16          # increase to 32 or 64 if GPU has >= 8 GB VRAM
  seed: 42

  # ── GPU / Mixed Precision ─────────────────────────────────────────────────
  # mixed_precision: enables torch.cuda.amp (float16 forward, float32 optim)
  # Gives 1.5-2x speedup on RTX/Volta GPUs with Tensor Cores.
  # Automatically disabled on CPU -- safe to leave true always.
  mixed_precision: true

  # ── Optimiser ─────────────────────────────────────────────────────────────
  learning_rate: 0.0005
  weight_decay: 0.0003
  gradient_clip: 1.0

  # ── Scheduler (ReduceLROnPlateau, monitors val_acc) ───────────────────────
  scheduler_patience: 4
  scheduler_factor: 0.5
  min_lr: 0.000001

  # ── Stopping ──────────────────────────────────────────────────────────────
  epochs: 120
  early_stopping_patience: 20

  # ── Loss ──────────────────────────────────────────────────────────────────
  label_smoothing: 0.05
  use_class_weights: true
  use_weighted_sampler: true

  # ── Curriculum learning ───────────────────────────────────────────────────
  use_curriculum: true

  # ── CNN-LSTM hyperparameters ───────────────────────────────────────────────
  hidden_size: 128
  num_layers: 1
  dropout: 0.35
  bidirectional: true
  use_attention: true
  attn_hidden_dim: 32
  norm_type: group

  # ── Audio Transformer hyperparameters ─────────────────────────────────────
  transformer:
    d_model: 128
    nhead: 4
    num_layers: 2
    dim_feedforward: 256
    dropout: 0.3
    max_seq_len: 500
