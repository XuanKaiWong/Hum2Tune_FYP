audio:
  sample_rate: 22050

  # keep both for compatibility with old and cleaned code
  duration: 10.0
  max_duration: 10.0
  min_duration: 2.0

  n_mels: 128
  n_mfcc: 13
  hop_length: 512
  n_fft: 2048
  win_length: 2048

  min_freq: 80.0
  max_freq: 8000.0
  fmin: 65.0
  fmax: 2093.0

  trim_silence: true
  trim_top_db: 20
  window_overlap_ratio: 0.0

  # this is the key the cleaned extractor uses
  normalize_features: true

  # optional legacy key, harmless to keep
  normalize: true

  augmentation:
    enabled: true
    noise_level: 0.005
    time_stretch_range: [0.85, 1.15]
    pitch_shift_steps: [-3, -2, -1, 1, 2, 3]